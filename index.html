<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0C0F14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>운동 기록</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
<style>
:root{
  --bg:#0C0F14; --sf:#141A23; --sf2:#1B2431; --sf3:#222C3A;
  --ln:#232C3B; --ink:#E9EDF4; --sub:#8B95A8; --dim:#566178;
  --mono:"SF Mono",ui-monospace,"Roboto Mono",Menlo,Consolas,monospace;
  --rd:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  background:var(--bg); color:var(--ink); min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard Variable",Pretendard,"Noto Sans KR","Malgun Gothic",sans-serif;
  font-size:.94rem; line-height:1.45; letter-spacing:-.01em;
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
input,textarea{font:inherit;color:var(--ink);background:var(--sf2);border:1px solid var(--ln);border-radius:10px;outline:none}
input:focus,textarea:focus{border-color:var(--sub)}
::placeholder{color:var(--dim)}
#wrap{max-width:480px;margin:0 auto;padding:0 14px calc(96px + env(safe-area-inset-bottom))}

/* ===== 상단 ===== */
#top{position:sticky;top:0;z-index:20;background:linear-gradient(var(--bg) 82%,transparent);padding:calc(10px + env(safe-area-inset-top)) 0 8px}
.dnav{display:flex;align-items:center;gap:4px}
.nb{width:38px;height:38px;border-radius:10px;color:var(--sub);font-size:1.35rem;line-height:1}
.nb:active{background:var(--sf)}
.dl{position:relative;font-size:1.12rem;font-weight:700;padding:6px 10px;border-radius:10px}
/* ===== 달력 ===== */
#cal{position:fixed;top:calc(94px + env(safe-area-inset-top));left:50%;transform:translate(-50%,-8px);width:min(452px,calc(100% - 24px));z-index:45;background:var(--sf);border:1px solid var(--ln);border-radius:16px;padding:12px;opacity:0;pointer-events:none;transition:.2s;box-shadow:0 18px 40px rgba(0,0,0,.45)}
#cal.on{opacity:1;pointer-events:auto;transform:translate(-50%,0)}
#calHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
#calTitle{font-weight:700;font-size:.95rem}
.cwd{display:grid;grid-template-columns:repeat(7,1fr);font-size:.66rem;color:var(--dim);text-align:center;margin-bottom:4px}
#calGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cday{position:relative;height:46px;border-radius:9px;font-size:.8rem;color:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-family:var(--mono)}
.cday:active{background:var(--sf2)}
.cday.oth{opacity:.35}
.cday.tdy{box-shadow:inset 0 0 0 1px var(--sub)}
.cday.sel{background:var(--sf3)}
.cds{display:flex;gap:2px;height:4px}
.cds i{width:4px;height:4px;border-radius:50%}
#syncDot{margin-left:auto;font-family:var(--mono);font-size:.72rem;color:var(--dim)}
#syncDot.busy{color:var(--sub)}
#syncDot.q{color:#E8C547}
.chips2{display:flex;gap:8px;margin-top:6px}
.chip2{font-size:.78rem;color:var(--sub);background:var(--sf);border:1px solid var(--ln);border-radius:99px;padding:5px 11px}
.chip2.on{color:#0C0F14;background:#5BC8D6;border-color:#5BC8D6;font-weight:700}
.chip2 b{color:var(--ink);font-weight:600}
.chip2.on b{color:#0C0F14}

/* ===== 타임 레일 (시그니처) ===== */
#rail{padding-top:4px}
.row{display:grid;grid-template-columns:44px 22px 1fr;column-gap:10px;align-items:center}
.tm{font-family:var(--mono);font-size:.72rem;color:var(--dim);text-align:right}
.rl{position:relative;height:100%;min-height:100%}
.rl::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--ln)}
.row.first .rl::before{top:50%}
.row.last  .rl::before{bottom:50%}
.nd{position:absolute;left:11px;top:50%;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;
    background:var(--bg);border:2px solid var(--dim)}
.row.dn .nd{background:var(--c);border-color:var(--c)}
.row.mk .nd{width:7px;height:7px;border-width:2px;border-color:var(--ln);background:var(--sf3)}
.row.mk{min-height:30px}
.row.mk .ct{font-size:.72rem;color:var(--dim);padding:6px 2px;letter-spacing:.02em}
.ct{padding:5px 0}
.cd{position:relative;background:var(--sf);border:1px solid var(--ln);border-radius:var(--rd);
    padding:11px 13px;display:flex;align-items:center;gap:10px}
.cd:active{background:var(--sf2)}
.row.dn .cd{background:var(--sf);background:color-mix(in srgb,var(--c) 9%,var(--sf));
            border-color:color-mix(in srgb,var(--c) 30%,var(--ln))}
.cdL{flex:1;min-width:0}
.nm{font-weight:650;font-size:.92rem;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.nm .ck{color:var(--c);font-size:.85rem}
.sp{font-size:.66rem;font-weight:600;color:var(--c);border:1px solid var(--c);border-radius:6px;padding:1px 6px;opacity:.85}
.sm{font-size:.76rem;color:var(--sub);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sm .mono{font-family:var(--mono);font-size:.73rem}
.chev{color:var(--dim);font-size:1.1rem;flex:none}
.qbtn{flex:none;width:42px;height:42px;border-radius:50%;border:2px solid var(--c);color:var(--c);
      font-size:1.05rem;font-weight:800;display:flex;align-items:center;justify-content:center}
.row.dn .qbtn{background:var(--c);color:#0C0F14}
.secLbl{font-size:.72rem;color:var(--dim);margin:16px 0 4px 76px;letter-spacing:.05em}
.freeAdd{display:block;width:calc(100% - 76px);margin:12px 0 4px 76px;padding:12px;border:1px dashed var(--ln);
         border-radius:var(--rd);color:var(--sub);font-size:.85rem}
.freeAdd:active{background:var(--sf)}

/* ===== 하단 내비 ===== */
#nav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;justify-content:center;gap:6px;
     background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
     border-top:1px solid var(--ln);padding:8px 14px calc(8px + env(safe-area-inset-bottom))}
#nav button{flex:1;max-width:150px;padding:10px 0;border-radius:12px;color:var(--dim);font-size:.86rem;font-weight:600}
#nav button.on{color:var(--ink);background:var(--sf)}

/* ===== 뷰 ===== */
.view{display:none}.view.on{display:block}

/* ===== 시트 ===== */
#scrim{position:fixed;inset:0;background:rgba(4,6,10,.6);opacity:0;pointer-events:none;transition:opacity .22s;z-index:40}
#scrim.on{opacity:1;pointer-events:auto}
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;max-width:520px;margin:0 auto;
       background:var(--sf);border:1px solid var(--ln);border-bottom:0;border-radius:20px 20px 0 0;
       transform:translateY(102%);transition:transform .26s cubic-bezier(.3,.9,.3,1);
       display:flex;flex-direction:column;max-height:90dvh}
#sheet.on{transform:translateY(0)}
.grab{width:38px;height:4px;border-radius:99px;background:var(--ln);margin:9px auto 2px;flex:none}
#shHead{display:flex;align-items:center;gap:10px;padding:8px 16px 10px;flex:none}
#shDotC{width:11px;height:11px;border-radius:50%;background:var(--c,#8B95A8);flex:none}
#shTitle{font-weight:750;font-size:1.02rem}
#shSub{font-size:.74rem;color:var(--sub);font-family:var(--mono)}
#shClose{margin-left:auto;width:34px;height:34px;border-radius:50%;background:var(--sf2);color:var(--sub)}
#shBody{overflow-y:auto;padding:2px 16px 14px;-webkit-overflow-scrolling:touch}
#shFoot{display:flex;gap:10px;padding:10px 16px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--ln);flex:none}
#shFoot .primary{flex:1;background:var(--c,#4C9BE8);color:#0B0E13;font-weight:800;font-size:.98rem;padding:14px;border-radius:13px}
#shFoot .danger{width:76px;color:#E86F6F;background:var(--sf2);border-radius:13px;font-weight:600}
#shFoot .danger[hidden]{display:none}

/* ===== 폼 ===== */
.fld{margin:12px 0}
.fl{font-size:.74rem;color:var(--sub);margin-bottom:6px}
.in{width:100%;padding:11px 12px;font-size:1rem}
.in.num{font-family:var(--mono)}
textarea.in{min-height:64px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chips.scroll{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.chips.scroll::-webkit-scrollbar{display:none}
.chip{border:1px solid var(--ln);background:var(--sf2);border-radius:99px;padding:7px 13px;font-size:.85rem;color:var(--sub);flex:none;font-family:var(--mono)}
.chip.on{background:var(--c,#4C9BE8);border-color:var(--c,#4C9BE8);color:#0B0E13;font-weight:700}
/* 리프팅 */
.exb{background:var(--sf2);border:1px solid var(--ln);border-radius:13px;padding:10px 11px;margin:10px 0}
.exh{display:flex;gap:8px;align-items:center}
.exn{flex:1;background:var(--sf3);padding:9px 11px;font-weight:650}
.ib{width:34px;height:34px;border-radius:9px;background:var(--sf3);color:var(--dim);flex:none}
.prevLn{font-size:.72rem;color:var(--dim);font-family:var(--mono);margin:7px 2px 0}
.srow{display:grid;grid-template-columns:20px 1fr 40px 1fr 26px;gap:7px;align-items:center;margin-top:8px}
.si{font-family:var(--mono);font-size:.74rem;color:var(--dim);text-align:center}
.skg,.srp{padding:10px 8px;text-align:center;font-family:var(--mono);font-size:1rem;background:var(--sf3)}
.x{font-size:.72rem;color:var(--dim);text-align:center;font-family:var(--mono)}
.exf{display:flex;gap:8px;margin-top:10px}
.tb{flex:1;padding:9px;border-radius:10px;background:var(--sf3);color:var(--sub);font-size:.82rem}
.addExBtn{display:block;width:100%;padding:12px;border:1px dashed var(--ln);border-radius:13px;color:var(--sub);font-size:.86rem;margin-top:10px}
.volLine{font-family:var(--mono);font-size:.8rem;color:var(--sub);text-align:right;margin-top:8px}
.volLine b{color:var(--ink)}
.paceView{font-family:var(--mono);font-size:.92rem;color:var(--ink);background:var(--sf2);border:1px dashed var(--ln);border-radius:10px;padding:10px;text-align:center;margin-top:10px}
.ib.mb.on{color:var(--c);border:1px solid var(--c)}
.exm{margin-top:8px}
.exmi{width:100%;background:var(--sf3);border:1px solid var(--ln);border-radius:9px;padding:9px 11px;font-size:.85rem}
.prevLn.pm{color:var(--sub)}
/* 메모 목록 */
.mlist{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.mitem{display:flex;gap:10px;align-items:baseline;text-align:left;background:var(--sf2);border:1px solid var(--ln);border-left:3px solid var(--c);border-radius:10px;padding:9px 11px;width:100%}
.mitem:active{background:var(--sf3)}
.mdate{font-family:var(--mono);font-size:.7rem;color:var(--dim);flex:none}
.mbody{font-size:.8rem;color:var(--ink);line-height:1.5}
.mbody b{color:var(--c);font-weight:650;margin-right:4px}

/* ===== 통계 ===== */
.card{background:var(--sf);border:1px solid var(--ln);border-radius:16px;padding:15px;margin:12px 0}
.ch{font-size:.78rem;color:var(--sub);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ch .dot{width:8px;height:8px;border-radius:50%;background:var(--c,#8B95A8)}
.bigrow{display:flex;gap:12px}
.bignum{flex:1;text-align:center;padding:6px 0}
.bignum b{display:block;font-family:var(--mono);font-size:1.7rem;font-weight:700;letter-spacing:-.02em}
.bignum span{font-size:.72rem;color:var(--sub)}
.hmwrap{overflow-x:auto;scrollbar-width:none}
.hmwrap::-webkit-scrollbar{display:none}
.brow{display:grid;grid-template-columns:64px 1fr 74px;gap:10px;align-items:center;margin:9px 0}
.brow .bl{font-size:.8rem;color:var(--sub)}
.bar{height:9px;background:var(--sf2);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--c,#4C9BE8);border-radius:99px}
.gnum{font-family:var(--mono);font-size:.8rem;text-align:right;color:var(--ink)}
.gcap{font-size:.7rem;color:var(--dim);margin-top:8px}
.totline{display:flex;align-items:baseline;gap:8px;margin:4px 0 8px}
.totline b{font-family:var(--mono);font-size:1.55rem}
.totline span{font-size:.75rem;color:var(--sub)}
.empt{font-size:.8rem;color:var(--dim);padding:6px 0}

/* ===== 설정 ===== */
.sbtn{display:block;width:100%;padding:13px;border-radius:12px;background:var(--sf2);color:var(--ink);font-weight:600;margin-top:10px}
.sbtn.warn{color:#E8C547}
.note{font-size:.76rem;color:var(--dim);line-height:1.6;margin-top:8px}

/* ===== 토스트 / PIN ===== */
#toast{position:fixed;left:50%;bottom:calc(84px + env(safe-area-inset-bottom));transform:translate(-50%,14px);
       background:var(--sf3);border:1px solid var(--ln);color:var(--ink);font-size:.84rem;padding:10px 16px;
       border-radius:99px;opacity:0;pointer-events:none;transition:.25s;z-index:60;white-space:nowrap}
#toast.on{opacity:1;transform:translate(-50%,0)}
#pinOverlay{position:fixed;inset:0;z-index:80;background:var(--bg);display:none;flex-direction:column;
            align-items:center;justify-content:center;gap:14px;padding:20px}
#pinOverlay.on{display:flex}
#pinOverlay h2{font-size:1.05rem}
#pinInput{width:170px;text-align:center;font-size:1.5rem;letter-spacing:.4em;padding:12px;font-family:var(--mono)}
#pinSubmit{background:#4C9BE8;color:#0B0E13;font-weight:800;padding:12px 34px;border-radius:12px}
#pinMsg{font-size:.8rem;color:#E86F6F;min-height:1.2em}

@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<div id="pinOverlay">
  <h2>🔒 PIN 입력</h2>
  <input type="password" id="pinInput" inputmode="numeric" autocomplete="off" placeholder="••••">
  <button id="pinSubmit" type="button">확인</button>
  <div id="pinMsg"></div>
</div>

<div id="wrap">
  <header id="top">
    <div class="dnav">
      <button id="dPrev" class="nb" type="button">‹</button>
      <button class="dl" id="dlBtn" type="button"><span id="dLabel"></span></button>
      <button id="dNext" class="nb" type="button">›</button>
      <span id="syncDot"></span>
    </div>
    <div class="chips2">
      <button id="blockChip" class="chip2" type="button">블록 설정</button>
      <button id="rainChip" class="chip2" type="button">☔ 비</button>
    </div>
  </header>
  <main>
    <section id="v-today" class="view on"><div id="rail"></div></section>
    <section id="v-stats" class="view"><div id="statsBody"></div></section>
    <section id="v-set"   class="view"><div id="setBody"></div></section>
  </main>
</div>

<nav id="nav">
  <button data-v="today" class="on" type="button">오늘</button>
  <button data-v="stats" type="button">통계</button>
  <button data-v="set"   type="button">설정</button>
</nav>

<div id="scrim"></div>
<div id="cal">
  <div id="calHead">
    <button class="nb" id="calPrev" type="button">‹</button>
    <span id="calTitle"></span>
    <button class="nb" id="calNext" type="button">›</button>
  </div>
  <div class="cwd"><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span><span>일</span></div>
  <div id="calGrid"></div>
</div>
<div id="sheet">
  <div class="grab"></div>
  <div id="shHead">
    <span id="shDotC"></span>
    <div><div id="shTitle"></div><div id="shSub"></div></div>
    <button id="shClose" type="button">✕</button>
  </div>
  <div id="shBody"></div>
  <div id="shFoot">
    <button id="shDel" class="danger" type="button" hidden>삭제</button>
    <button id="shSave" class="primary" type="button">저장</button>
  </div>
</div>

<div id="toast"></div>
<datalist id="exlist"></datalist>
<script>
'use strict';
/* ================= 상수: 루틴 템플릿 ================= */
var SPORT = {
  '리프팅':'#F4633A','러닝':'#4C9BE8','축구':'#2FB85E','풋살':'#0FA79A','볼마스터리':'#8CCB3E',
  '아킬레스':'#7E5CE6','코어':'#C05CD8','가동성':'#9E8CF2','반응':'#3FC98C','기타':'#8B95A8'
};
var SLOT_ORDER = ['05시','07시','오전','12시','16시','18시','19시','21시','기타'];

var TLABEL = {'05시':'05:00','07시':'07:00','오전':'오전','12시':'12:00','16시':'16:00','18시':'18:00','19시':'19:00','21시':'21:00','기타':''};

var DAILY = [
  {k:'ach07',  t:'07시', sport:'아킬레스', label:'아킬레스 등척성', quick:1},

  {k:'ach19',  t:'19시', sport:'아킬레스', label:'아킬레스 등척성', quick:1}
];
var WEEK = {

  2:[{k:'mob05',t:'05시',sport:'가동성',label:'가동성',quick:1},
     {k:'lower',t:'19시',sport:'리프팅',label:'하체 · 스쿼트/데드'},
     {k:'speed',t:'19시',sport:'러닝',type:'인터벌',label:'중장거리 스피드',out:1}],

     {k:'ball',t:'19시',sport:'볼마스터리',label:'볼마스터리'},
     {k:'mob19',t:'19시',sport:'가동성',label:'가동성 훈련',quick:1},
     {k:'futsal',t:'19시',sport:'풋살',label:'풋살',out:2}],
  5:[{k:'z2',t:'05시',sport:'러닝',type:'존2',label:'존2 러닝 60분',out:1},
     {k:'pullpush',t:'19시',sport:'리프팅',label:'상체 · 당기기+밀기'}],
  6:[{k:'z2',t:'05시',sport:'러닝',type:'존2',label:'존2 러닝 60분',out:1},
     {k:'react',t:'19시',sport:'반응',label:'반응 훈련'}],
  0:[{k:'soccer',t:'오전',sport:'축구',label:'축구',out:1},
     {k:'mob19',t:'19시',sport:'가동성',label:'가동성',quick:1}]
};
var RAIN_ALT = {
  z2:    {sport:'러닝', type:'존2',    label:'☔ 실내 존2 60분 (사이클·트레드밀·계단)'},
  speed: {sport:'러닝', type:'인터벌', label:'☔ 트레드밀 인터벌'},
  soccer:{sport:'볼마스터리',          label:'☔ 대체: 볼마스터리 + 반응'}
};
var QUICK_DEF = {
  '아킬레스':{raw:{load:40,hold:45,sets:4}, detail:'40kg · 45초 × 4세트', min:null},

  '가동성':  {raw:{min:15},                 detail:'가동성 15분',          min:15}
};
var EXS = ['스쿼트','벤치프레스','데드리프트','오버헤드프레스','바벨로우','턱걸이','랫풀다운',
           '인클라인 벤치프레스','루마니안 데드리프트','레그프레스','딥스','바이셉 컬','페이스풀','케이블 로우'];
var RPES = ['5','6','6.5','7','7.5','8','8.5','9','9.5','10'];

/* ================= 저장소 · 상태 ================= */
function load(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function store(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
var DB  = load('wk2_db',{logs:[],lastSync:null});
var CFG = load('wk2_cfg',{blockName:'',blockStart:'',rain:{}});
var Q   = load('wk2_q',[]);
var DEL = load('wk2_del',[]);   /* 오프라인 삭제 대기 큐 */
var cur = todayStr();
var TP  = {items:[],matched:{},extra:[]};   /* 오늘 화면 캐시 */
var SH  = null;                              /* 시트 컨텍스트 */

/* ================= 유틸 ================= */
function el(id){return document.getElementById(id)}
function pad(n){return n<10?'0'+n:''+n}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function parseD(s){var a=String(s).slice(0,10).split('-');return new Date(+a[0],+a[1]-1,+a[2])}
function shiftD(s,n){var d=parseD(s);d.setDate(d.getDate()+n);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function dow(s){return parseD(s).getDay()}
function weekStart(s){return shiftD(s,-((dow(s)+6)%7))} /* 월요일 */
function fmtHead(s){var d=parseD(s);var w='일월화수목금토'[d.getDay()];
  var t=(s===todayStr())?' · 오늘':(s===shiftD(todayStr(),-1)?' · 어제':'');
  return (d.getMonth()+1)+'월 '+d.getDate()+'일 ('+w+')'+t}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function n2(v){var n=Number(v);return isFinite(n)?n:null}
function paceSec(km,min){if(!km||!min)return null;return min*60/km}
function paceStr(sec){if(!isFinite(sec)||sec==null||sec<=0)return'';
  var m=Math.floor(sec/60),s=Math.round(sec%60);if(s===60){m++;s=0}
  return m+"'"+pad(s)+'"'}
function mkTitle(label){var d=parseD(cur);return (d.getMonth()+1)+'/'+d.getDate()+' '+label}
function isTmp(id){return /^tmp/.test(String(id))}
function tmpId(){return 'tmp'+Date.now()+Math.random().toString(36).slice(2,6)}
function rawOf(l){try{return JSON.parse(l.raw||'{}')||{}}catch(e){return{}}}
var _tt=null;
function toast(msg){var t=el('toast');t.textContent=msg;t.classList.add('on');
  clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('on')},2200)}

/* ================= API · PIN ================= */
function getPin(){try{return localStorage.getItem('wk2_pin')||''}catch(e){return''}}
function api(path,body){
  return fetch(path,{method:'POST',
    headers:{'Content-Type':'application/json','x-app-pin':getPin()},
    body:JSON.stringify(body||{})
  }).then(function(r){
    return r.json().catch(function(){return{error:'응답 해석 실패'}}).then(function(j){
      if(r.status===401&&j.pin){showPin();var e=new Error('PIN');e.pin=1;throw e}
      if(!r.ok||j.error)throw new Error(j.error||('HTTP '+r.status));
      return j;
    });
  });
}
function showPin(msg){el('pinOverlay').classList.add('on');el('pinMsg').textContent=msg||'';
  setTimeout(function(){el('pinInput').focus()},50)}
el('pinSubmit').addEventListener('click',function(){
  var v=el('pinInput').value.trim();if(!v)return;
  try{localStorage.setItem('wk2_pin',v)}catch(e){}
  el('pinOverlay').classList.remove('on');el('pinInput').value='';
  boot();
});
el('pinInput').addEventListener('keydown',function(e){if(e.key==='Enter')el('pinSubmit').click()});

/* ================= 동기화 (증분 + 전체) ================= */
var syncing=false;
function setSyncUI(){var d=el('syncDot');
  if(syncing){d.textContent='동기화…';d.className='busy';return}
  var q=Q.length+DEL.length;
  if(q){d.textContent='대기 '+q;d.className='q';return}
  d.textContent='';d.className=''}
function sync(full){
  if(syncing)return Promise.resolve();
  syncing=true;setSyncUI();
  var from=(!full&&DB.lastSync)?shiftD(DB.lastSync,-7):null;
  var acc=[];
  function page(cursor){
    return api('/api/logs',{from:from,cursor:cursor}).then(function(r){
      acc=acc.concat(r.logs||[]);
      if(r.next)return page(r.next);
    });
  }
  return page(null).then(function(){
    var map={};
    (full?DB.logs.filter(function(l){return isTmp(l.id)}):DB.logs).forEach(function(l){map[l.id]=l});
    acc.forEach(function(l){if(l.date)map[l.id]=l});
    DB.logs=Object.keys(map).map(function(k){return map[k]});
    prune();DB.lastSync=todayStr();store('wk2_db',DB);
    renderAll();if(full)toast('전체 동기화 완료');
  }).catch(function(e){
    if(!e.pin)toast('동기화 실패: '+e.message);
  }).then(function(){syncing=false;setSyncUI()});
}
function prune(){var cut=shiftD(todayStr(),-420);
  DB.logs=DB.logs.filter(function(l){return isTmp(l.id)||l.date>=cut})}

/* ================= 저장 파이프라인 (오프라인 큐) ================= */
function findLog(id){for(var i=0;i<DB.logs.length;i++)if(DB.logs[i].id===id)return DB.logs[i];return null}
function upsertLocal(rec){var f=findLog(rec.id);
  if(f){for(var k in rec)f[k]=rec[k]}else DB.logs.push(rec);
  store('wk2_db',DB)}
function removeLocal(id){DB.logs=DB.logs.filter(function(l){return l.id!==id});store('wk2_db',DB)}
function toPayload(rec){
  var p={title:rec.title,date:rec.date,slot:rec.slot,sport:rec.sport,type:rec.type,
         detail:rec.detail,volumeKg:rec.volumeKg,distanceKm:rec.distanceKm,
         durationMin:rec.durationMin,pace:rec.pace,rpe:rec.rpe,block:rec.block,
         memo:rec.memo,raw:rec.raw};
  if(!isTmp(rec.id))p.id=rec.id;
  return p;
}
/* 전송된 내용과 현재 내용이 같은지 비교(id 제외) — 전송 중 수정 감지용 */
function contentSig(rec){
  return JSON.stringify([rec.title,rec.date,rec.slot,rec.sport,rec.type,rec.detail,
    rec.volumeKg,rec.distanceKm,rec.durationMin,rec.pace,rec.rpe,rec.block,rec.memo,rec.raw]);
}
function saveRecord(rec){
  upsertLocal(rec);
  if(Q.indexOf(rec.id)<0)Q.push(rec.id);
  store('wk2_q',Q);setSyncUI();
  renderAll();
  flushQ();
}
var flushing=false;
function flushQ(){
  if(flushing||(!Q.length&&!DEL.length))return Promise.resolve();
  flushing=true;
  var dels=DEL.slice(),ids=Q.slice(),chain=Promise.resolve(),fails=0;
  dels.forEach(function(id){
    chain=chain.then(function(){
      return api('/api/save',{id:id,del:1}).then(function(){dropDel(id)})
        .catch(function(e){fails++;if(e.pin)throw e});
    });
  });
  ids.forEach(function(id){
    chain=chain.then(function(){
      var rec=findLog(id);
      if(!rec){dropQ(id);return}
      var sig=contentSig(rec);
      return api('/api/save',toPayload(rec)).then(function(r){
        var now=findLog(id);
        if(isTmp(id)){
          if(now){removeLocal(id);now.id=r.id;upsertLocal(now)}
          dropQ(id);
          /* 전송 중 수정됐으면 새 id로 다시 큐잉 */
          if(now&&contentSig(now)!==sig&&Q.indexOf(now.id)<0){Q.push(now.id);store('wk2_q',Q)}
        }else if(now&&contentSig(now)!==sig){
          /* 전송 중 수정됨 — 큐에 남겨 재전송(덮어쓰기 방지) */
        }else{
          dropQ(id);
        }
      }).catch(function(e){fails++;if(e.pin)throw e});
    });
  });
  return chain.catch(function(){}).then(function(){
    flushing=false;setSyncUI();renderAll();
    if(fails&&navigator.onLine){toast('일부 기록 전송 대기 중');return}
    if(navigator.onLine&&(Q.length||DEL.length))return flushQ();
  });
}
function dropQ(id){var i=Q.indexOf(id);if(i>=0){Q.splice(i,1);store('wk2_q',Q)}setSyncUI()}
function dropDel(id){var i=DEL.indexOf(id);if(i>=0){DEL.splice(i,1);store('wk2_del',DEL)}setSyncUI()}

/* ================= 플랜 · 매칭 ================= */
function planFor(dateStr){
  var d=dow(dateStr);
  var items=DAILY.concat(WEEK[d]||[]);
  var rain=!!CFG.rain[dateStr];
  return items.map(function(it){
    var o={};for(var k in it)o[k]=it[k];
    if(rain&&o.out===1&&RAIN_ALT[o.k]){var a=RAIN_ALT[o.k];
      o.sport=a.sport;o.label=a.label;if(a.type)o.type=a.type;o.alt=1}
    if(rain&&o.out===2)o.hint='☔ 실내 구장이면 그대로 진행';
    return o;
  });
}
function logsOf(date){return DB.logs.filter(function(l){return l.date===date})}
function matchAll(items,logs){
  var used={},m={};
  items.forEach(function(it){
    for(var i=0;i<logs.length;i++){var l=logs[i];
      if(!used[l.id]&&rawOf(l).k===it.k){m[it.k+'|'+it.t]=l;used[l.id]=1;return}}
  });
  items.forEach(function(it){
    if(m[it.k+'|'+it.t])return;
    for(var i=0;i<logs.length;i++){var l=logs[i];
      if(!used[l.id]&&!rawOf(l).k&&l.slot===it.t&&l.sport===it.sport){m[it.k+'|'+it.t]=l;used[l.id]=1;return}}
  });
  return {m:m,used:used};
}
function lastByKey(k,notId){
  var best=null;
  DB.logs.forEach(function(l){
    if(l.id===notId||l.date>=cur)return;
    if(rawOf(l).k===k&&(!best||l.date>best.date))best=l;
  });
  return best;
}

/* ================= 오늘 화면 ================= */
function blockLabel(){
  if(!CFG.blockName)return'';
  var wk='';
  if(CFG.blockStart){
    var days=Math.floor((parseD(cur)-parseD(CFG.blockStart))/86400000);
    if(days>=0)wk=' '+(Math.floor(days/7)+1)+'주차';
  }
  return CFG.blockName+wk;
}
function renderChips(){
  var bc=el('blockChip');
  bc.innerHTML=CFG.blockName?('블록 <b>'+esc(blockLabel())+'</b>'):'블록 설정';
  var rc=el('rainChip'),on=!!CFG.rain[cur];
  rc.classList.toggle('on',on);
  rc.textContent=on?'☔ 비 · 대체 모드':'☔ 비';
}
function mkrRow(t){
  return '<div class="row mk"><div class="tm">'+TLABEL[t]+'</div>'
    +'<div class="rl"><i class="nd"></i></div><div class="ct">'+MARKER[t]+'</div></div>';
}
function itemRow(it,log,tshow){
  var c=SPORT[it.sport]||SPORT['기타'];
  var done=!!log,sub;
  if(done){
    sub=esc(log.detail||'완료');
    if(log.rpe!=null&&log.rpe!=='')sub+=' · RPE '+log.rpe;
  }else if(it.hint){sub=esc(it.hint)}
  else{
    var prev=lastByKey(it.k);
    sub=prev?('지난 '+prev.date.slice(5).replace('-','/')+' · '+esc(prev.detail||'')):(it.quick?'탭해서 완료':'탭해서 기록');
  }
  var right=it.quick
    ?'<button class="qbtn" data-q="'+it._i+'" type="button">✓</button>'
    :'<span class="chev">›</span>';
  return '<div class="row it'+(done?' dn':'')+'" style="--c:'+c+'">'
    +'<div class="tm">'+tshow+'</div>'
    +'<div class="rl"><i class="nd"></i></div>'
    +'<div class="ct"><div class="cd" data-open="'+it._i+'">'
    +'<div class="cdL"><div class="nm">'+(done?'<span class="ck">✓</span>':'')+esc(it.label)
    +' <span class="sp">'+esc(it.sport)+'</span></div>'
    +'<div class="sm">'+sub+'</div></div>'
    +right+'</div></div></div>';
}
function extraRow(l,i){
  var c=SPORT[l.sport]||SPORT['기타'];
  var sub=esc(l.detail||'');
  if(l.rpe!=null&&l.rpe!=='')sub+=(sub?' · ':'')+'RPE '+l.rpe;
  var label=(l.title||'').replace(/^\d+\/\d+\s*/,'')||l.sport||'기록';
  return '<div class="row it dn" style="--c:'+c+'">'
    +'<div class="tm"></div><div class="rl"><i class="nd"></i></div>'
    +'<div class="ct"><div class="cd" data-x="'+i+'">'
    +'<div class="cdL"><div class="nm"><span class="ck">✓</span>'+esc(label)
    +' <span class="sp">'+esc(l.sport||'기타')+'</span></div>'
    +'<div class="sm">'+(sub||'완료')+'</div></div>'
    +'<span class="chev">›</span></div></div></div>';
}
function renderToday(){
  el('dLabel').textContent=fmtHead(cur);
  renderChips();
  var items=planFor(cur),logs=logsOf(cur);
  items.forEach(function(it,i){it._i=i});
  var mm=matchAll(items,logs);
  TP={items:items,matched:mm.m,extra:logs.filter(function(l){return !mm.used[l.id]})};
  var byT={};items.forEach(function(it){(byT[it.t]=byT[it.t]||[]).push(it)});
  var rows=[];
  SLOT_ORDER.forEach(function(t){
    var mk=MARKER[t],its=byT[t]||[];
    if(!mk&&!its.length)return;
    if(mk)rows.push(mkrRow(t));
    its.forEach(function(it,i){
      rows.push(itemRow(it,TP.matched[it.k+'|'+it.t],(!mk&&i===0)?TLABEL[t]:''));
    });
  });
  if(TP.extra.length){
    rows.push('<div class="row mk"><div class="tm"></div><div class="rl"><i class="nd"></i></div><div class="ct">추가 기록</div></div>');
    TP.extra.forEach(function(l,i){rows.push(extraRow(l,i))});
  }
  if(rows.length){
    rows[0]=rows[0].replace('class="row','class="row first');
    rows[rows.length-1]=rows[rows.length-1].replace('class="row','class="row last');
  }
  el('rail').innerHTML=rows.join('')
    +'<button class="freeAdd" data-free="1" type="button">＋ 자유 기록</button>';
}
function itemFromLog(l){
  var r=rawOf(l);
  return {k:r.k||'free',t:l.slot||'기타',sport:l.sport||'기타',
    label:(l.title||'').replace(/^\d+\/\d+\s*/,'')||l.sport||'기록',
    free:r.k?0:1,type:l.type||''};
}
function quickSave(it){
  var prev=lastByKey(it.k),raw={},detail,minv=null,k;
  if(prev){
    var pr=rawOf(prev);for(k in pr)raw[k]=pr[k];
    detail=prev.detail;minv=prev.durationMin;
  }else{
    var qd=QUICK_DEF[it.sport]||{raw:{},detail:it.label,min:null};
    for(k in qd.raw)raw[k]=qd.raw[k];
    detail=qd.detail;minv=qd.min;
  }
  raw.k=it.k;
  saveRecord({id:tmpId(),date:cur,slot:it.t,sport:it.sport,type:it.type||'',
    title:mkTitle(it.label),detail:detail||it.label,volumeKg:null,distanceKm:null,
    durationMin:minv,pace:'',rpe:null,block:CFG.blockName||'',
    memo:it.alt?'☔ 대체':'',raw:JSON.stringify(raw)});
  toast('완료 · 카드를 탭하면 수정');
}
el('rail').addEventListener('click',function(e){
  var q=e.target.closest('[data-q]');
  if(q){
    var it=TP.items[+q.getAttribute('data-q')];
    var lg=TP.matched[it.k+'|'+it.t];
    if(lg)openSheet(it,lg);else quickSave(it);
    return;
  }
  var x=e.target.closest('[data-x]');
  if(x){var l=TP.extra[+x.getAttribute('data-x')];if(l)openSheet(itemFromLog(l),l);return}
  var o=e.target.closest('[data-open]');
  if(o){var it2=TP.items[+o.getAttribute('data-open')];if(it2)openSheet(it2,TP.matched[it2.k+'|'+it2.t]||null);return}
  if(e.target.closest('[data-free]'))openSheet({k:'free',t:'기타',sport:'기타',label:'자유 기록',free:1},null);
});

/* ================= 기록 시트 ================= */
function openSheet(it,log){
  closeCal();
  SH={it:it,log:log||null,
      sport:log?(log.sport||it.sport||'기타'):(it.sport||'기타'),
      rpe:(log&&log.rpe!=null)?log.rpe:null,
      runType:null,ghost:null,ghostDate:'',memoDraft:null};
  setSheetColor();
  el('shTitle').textContent=it.label;
  el('shSub').textContent=(log?log.date:cur).slice(5).replace('-','/')+' · '+(it.t||'기타')+(log?' · 수정':'');
  el('shDel').hidden=!log;
  buildForm();
  el('scrim').classList.add('on');el('sheet').classList.add('on');
}
function setSheetColor(){
  var c=SPORT[SH.sport]||SPORT['기타'];
  el('sheet').style.setProperty('--c',c);
  el('shDotC').style.background=c;
}
function closeSheet(){el('scrim').classList.remove('on');el('sheet').classList.remove('on');SH=null}
function buildForm(){
  var it=SH.it,log=SH.log,d=log?rawOf(log):null,h='';
  if(it.free)h+=sportChips();
  h+=formFor(SH.sport,d,log);
  h+=commonForm(log);
  el('shBody').innerHTML=h;el('shBody').scrollTop=0;
  if(SH.sport==='리프팅')updVol();
  if(SH.sport==='러닝')updPace();
}
function sportChips(){
  return '<div class="fld"><div class="fl">종목</div><div class="chips scroll">'
    +Object.keys(SPORT).map(function(s){
      return '<button class="chip'+(s===SH.sport?' on':'')+'" data-sport="'+s+'" type="button" style="--c:'+SPORT[s]+'">'+s+'</button>';
    }).join('')+'</div></div>';
}
function formFor(sport,d,log){
  if(sport==='리프팅')return liftForm(d,log);
  if(sport==='러닝')return runForm(d,log);
  if(sport==='아킬레스')return achForm(d,log);
  return minForm(sport,d,log);
}
function setsSummary(s){
  if(!s||!s.length)return'';
  var same=s.every(function(x){return String(x[0])===String(s[0][0])&&String(x[1])===String(s[0][1])});
  return same?(s[0][0]+'×'+s[0][1]+'×'+s.length):s.map(function(x){return x[0]+'×'+x[1]}).join(' ');
}
function srow(j,s,g){
  var kg=(s&&s[0]!==''&&s[0]!=null)?s[0]:'';
  var rp=(s&&s[1]!==''&&s[1]!=null)?s[1]:'';
  return '<div class="srow"><span class="si">'+(j+1)+'</span>'
    +'<input class="skg" inputmode="decimal" placeholder="'+(g?esc(g[0]):'kg')+'" value="'+esc(kg)+'">'
    +'<span class="x">kg ×</span>'
    +'<input class="srp" inputmode="numeric" placeholder="'+(g?esc(g[1]):'회')+'" value="'+esc(rp)+'">'
    +'<span class="x">회</span></div>';
}
function exBlock(e,g){
  var prevLn=g?'<div class="prevLn">지난'+(SH.ghostDate?' '+SH.ghostDate.slice(5).replace('-','/'):'')+' · '+esc(setsSummary(g.s))+'</div>':'';
  var prevM=(g&&g.m)?'<div class="prevLn pm">지난 메모 · '+esc(g.m)+'</div>':'';
  var hasM=!!(e.m&&String(e.m).trim());
  var rows=e.s.map(function(s,j){return srow(j,s,(g&&g.s&&g.s[j])?g.s[j]:null)}).join('');
  return '<div class="exb">'
    +'<div class="exh"><input class="exn" list="exlist" placeholder="운동명" value="'+esc(e.n||'')+'">'
    +'<button class="ib mb'+(hasM?' on':'')+'" data-act="exMemo" type="button">📝</button>'
    +'<button class="ib" data-act="delEx" type="button">✕</button></div>'
    +prevLn+prevM

function collect(){
  var out={detail:'',volumeKg:null,distanceKm:null,durationMin:null,pace:'',type:'',raw:{}};
  var it=SH.it;
  if(it.k&&it.k!=='free')out.raw.k=it.k;
  var s=SH.sport;
  if(s==='리프팅'){
    var ex=[],sum=0;
    document.querySelectorAll('#exArea .exb').forEach(function(b){
      var n=b.querySelector('.exn').value.trim(),sets=[];
      b.querySelectorAll('.srow').forEach(function(r){
        var kg=n2(r.querySelector('.skg').value),rp=n2(r.querySelector('.srp').value);
        if(rp&&rp>0){sets.push([kg||0,rp]);sum+=(kg||0)*rp}
      });
      var mi=b.querySelector('.exmi'),mv=mi?mi.value.trim():'';
      if(n&&sets.length){var eo={n:n,s:sets};if(mv)eo.m=mv;ex.push(eo)}
    });
    if(!ex.length){toast('운동명과 세트를 입력하세요');return null}
    out.raw.ex=ex;out.volumeKg=Math.round(sum);
    out.detail=ex.map(function(e){return e.n+' '+setsSummary(e.s)}).join(' · ');
  }else if(s==='러닝'){
    var d=n2(el('fDist').value),m=n2(el('fMin').value);
    if(!d&&!m){toast('거리 또는 시간을 입력하세요');return null}
    out.distanceKm=d;out.durationMin=m;out.type=SH.runType||'존2';
    var ps=paceSec(d,m);out.pace=ps?paceStr(ps):'';
    out.detail=(d?d+'km':'')+(m?((d?' ':'')+m+'분'):'')+(out.pace?' · '+out.pace+'/km':'');
    out.raw.run={d:d,m:m};
  }else if(s==='아킬레스'){
    var vOr=function(id){var e2=el(id);var v=e2.value.trim()!==''?e2.value:e2.placeholder;return n2(v)};
    var L=vOr('fLoad'),H=vOr('fHold'),S2=vOr('fSets');
    out.detail=(L!=null?L:'?')+'kg · '+(H!=null?H:'?')+'초 × '+(S2!=null?S2:'?')+'세트';
    out.raw.load=L;out.raw.hold=H;out.raw.sets=S2;
  }else{
    var m2=n2(el('fMin2').value);
    out.durationMin=m2;out.type=it.type||'';
    out.detail=(it.free?s:it.label)+(m2?' '+m2+'분':'');
    out.raw.min=m2;
  }
  return out;
}

function calDots(date){
  var ls=logsOf(date);

  var order=Object.keys(SPORT),seen={},sports=[];
  ls.forEach(function(l){var s=l.sport||'기타';if(!seen[s]){seen[s]=1;sports.push(s)}});
  sports.sort(function(a,b){return order.indexOf(a)-order.indexOf(b)});
  var h='';
  sports.slice(0,4).forEach(function(s){h+='<i style="background:'+(SPORT[s]||SPORT['기타'])+'"></i>'});
  return '<span class="cds">'+h+'</span>';

function renderStats(){
  var today=todayStr();
  var st=0,d=logsOf(today).length?today:shiftD(today,-1);
  while(logsOf(d).length){st++;d=shiftD(d,-1)}
  var ws=weekStart(today),P=0,D=0,dd=ws;

    +'<div class="bignum"><b>'+logsOf(today).length+'</b><span>오늘 기록</span></div>'
    +'</div></div>';

var HEAT_F='all',MEMO_G='all',MEMO_N='all';
var HEAT_GROUPS={'구기':['축구','풋살','볼마스터리','반응'],'보강':['아킬레스','코어','가동성']};
var HEAT_RAMPS={
  all:      ['#1B2431','#1E4038','#226047','#2C8A5C','#3FC47C'],
  '리프팅': ['#1B2431','#33251F','#5A3323','#A64A2C','#F4633A'],
  '러닝':   ['#1B2431','#1E2A40','#26405F','#356A9E','#4C9BE8'],
  '구기':   ['#1B2431','#1E3A2A','#256E44','#2C9C58','#33C566'],
  '보강':   ['#1B2431','#241F3A','#382C63','#5842A8','#7E5CE6']
};
var HEAT_CAPS={
  all:'색이 진할수록 그날 계획 대비 완료율이 높아요 · 테두리 = 오늘',
  '리프팅':'진하기 = 그날 총 톤수(kg) · 기간 내 최대 대비',
  '러닝':'진하기 = 그날 거리(km) · 기간 내 최대 대비',
  '구기':'진하기 = 축구·풋살·볼마스터리·반응 합산 시간(분)',
  '보강':'진하기 = 아킬레스·코어·가동성 완료 횟수'
};
function heatDay(ds){
  var lgs=logsOf(ds);
  if(HEAT_F==='all'){
    var its=planFor(ds);
    return {n:lgs.length,done:Object.keys(matchAll(its,lgs).m).length,p:its.length,v:0};
  }
  var v=0,n=0;
  lgs.forEach(function(l){
    if(HEAT_F==='리프팅'){if(l.sport==='리프팅'){n++;v+=(l.volumeKg||0)}}
    else if(HEAT_F==='러닝'){if(l.sport==='러닝'){n++;v+=(l.distanceKm||0)}}
    else{
      var g=HEAT_GROUPS[HEAT_F]||[];
      if(g.indexOf(l.sport)>=0){n++;if(HEAT_F==='구기')v+=(l.durationMin||0)}
    }
  });
  if(HEAT_F==='보강')v=n;
  return {n:n,v:v};
}
function heatCard(){
  var GR=HEAT_RAMPS[HEAT_F]||HEAT_RAMPS.all;
  var today=todayStr(),start=weekStart(shiftD(today,-97));
  var step=16,cs=13,top=14;
  var days=Math.round((parseD(today)-parseD(start))/86400000);
  var arr=[],max=0,i;
  for(i=0;i<=days;i++){
    var o=heatDay(shiftD(start,i));o.ds=shiftD(start,i);arr.push(o);
    if(HEAT_F!=='all'&&o.v>max)max=o.v;
  }
  var cells='',labels='',lastMonth=-1;
  arr.forEach(function(o,j){
    var c2=Math.floor(j/7),r=j%7,ds=o.ds;
    if(r===0){
      var mo=parseD(ds).getMonth()+1;
      if(mo!==lastMonth){labels+='<text x="'+(c2*step)+'" y="9" font-size="8" fill="#566178">'+mo+'월</text>';lastMonth=mo}
    }
    var lvl=0,tip;
    if(HEAT_F==='all'){
      if(o.n){var ratio=o.p?o.done/o.p:1;lvl=ratio>=1?4:(ratio>=0.75?3:(ratio>=0.4?2:1))}
      tip=ds+' · '+o.done+'/'+o.p+(o.n>o.done?' (+'+(o.n-o.done)+')':'');
    }else{
      if(o.n)lvl=max>0?Math.max(1,Math.min(4,Math.ceil(o.v/max*4))):1;
      var u=HEAT_F==='리프팅'?Math.round(o.v).toLocaleString()+'kg'
        :HEAT_F==='러닝'?(Math.round(o.v*10)/10)+'km'
        :HEAT_F==='구기'?Math.round(o.v)+'분':o.v+'회';
      tip=ds+' · '+(o.n?u:'기록 없음');
    }
    cells+='<rect x="'+(c2*step)+'" y="'+(top+r*step)+'" width="'+cs+'" height="'+cs+'" rx="3" fill="'+GR[lvl]+'"'
      +(ds===today?' stroke="#E9EDF4" stroke-width="1"':'')
      +'><title>'+tip+'</title></rect>';
  });
  var cols=Math.floor(days/7)+1,w=cols*step+18,hh=top+7*step-3;
  var chips=[['all','전체'],['리프팅','리프팅'],['러닝','러닝'],['구기','구기'],['보강','보강']].map(function(f){
    return '<button class="chip'+(HEAT_F===f[0]?' on':'')+'" data-hf="'+f[0]+'" type="button" style="--c:'+HEAT_RAMPS[f[0]][4]+'">'+f[1]+'</button>';
  }).join('');
  return '<div class="card"><div class="ch"><span class="dot" style="background:'+GR[4]+'"></span>운동 잔디 · 최근 '+cols+'주</div>'
    +'<div class="chips scroll" style="margin-bottom:10px">'+chips+'</div>'
    +'<div class="hmwrap"><svg width="'+w+'" height="'+hh+'" viewBox="0 0 '+w+' '+hh+'" xmlns="http://www.w3.org/2000/svg">'+labels+cells+'</svg></div>'
    +'<div class="gcap">'+HEAT_CAPS[HEAT_F]+'</div></div>';
}
function clsLift(n){
  n=String(n||'');
  if(/스쿼트/.test(n)&&!/프론트|고블릿|불가리안|박스|스플릿/.test(n))return'sq';
  if(/벤치/.test(n)&&!/인클라인|디클라인|덤벨|클로즈/.test(n))return'bp';
  if(/데드/.test(n)&&!/루마니안|스티프|루마|rdl/i.test(n))return'dl';
  return null;
}
function big3Card(){
  function bn(v,lab){return '<div class="bignum"><b style="font-size:1.15rem">'+(v?Math.round(v):'—')+'</b><span>'+lab+' e1RM</span></div>'}
  var best={sq:0,bp:0,dl:0};
  DB.logs.forEach(function(l){
    if(l.sport!=='리프팅')return;
    var ex=rawOf(l).ex;if(!ex)return;
    ex.forEach(function(e){
      var c=clsLift(e.n);if(!c)return;
      (e.s||[]).forEach(function(s){
        var kg=Number(s[0]),rp=Number(s[1]);
        if(!(kg>0&&rp>0))return;
        var e1=kg*(1+Math.min(rp,12)/30);
        if(e1>best[c])best[c]=e1;
      });
    });
  });
  var tot=best.sq+best.bp+best.dl,c2=SPORT['리프팅'],inner;
  if(!tot){inner='<div class="empt">리프팅 세트를 기록하면 e1RM이 자동 계산됩니다</div>'}
  else{
    var pct=Math.min(100,tot/500*100);
    inner='<div class="totline"><b>'+Math.round(tot)+'</b><span>/ 500 kg</span></div>'
      +'<div class="bar" style="--c:'+c2+'"><i style="width:'+pct.toFixed(1)+'%"></i></div>'
      +'<div class="bigrow" style="margin-top:12px">'+bn(best.sq,'스쿼트')+bn(best.bp,'벤치')+bn(best.dl,'데드')+'</div>';
  }
  return '<div class="card"><div class="ch"><span class="dot" style="background:'+c2+'"></span>3대 500 진행률</div>'
    +inner+'<div class="gcap">최고 세트 기준 e1RM(Epley) 합산 · 목표 500kg</div></div>';
}
function sub3Card(){
  var c=SPORT['러닝'],best=null,z2=[],cut=shiftD(todayStr(),-28);
  DB.logs.forEach(function(l){
    if(l.sport!=='러닝')return;
    var ps=paceSec(l.distanceKm,l.durationMin);if(!ps)return;
    if(l.distanceKm>=3&&l.type!=='회복'&&(best==null||ps<best))best=ps;
    if(l.type==='존2'&&l.date>=cut)z2.push(ps);
  });
  var z2avg=z2.length?z2.reduce(function(a,b){return a+b},0)/z2.length:null;
  var inner;
  if(best==null){inner='<div class="empt">3km 이상 러닝을 기록하면 페이스가 추적됩니다</div>'}
  else{
    var base=360,pct=Math.max(0,Math.min(100,(base-best)/(base-SUB3_SEC)*100));
    inner='<div class="totline"><b>'+paceStr(best)+'</b><span>최고 페이스 /km · 목표 4\'15"</span></div>'
      +'<div class="bar" style="--c:'+c+'"><i style="width:'+pct.toFixed(1)+'%"></i></div>';
  }
  inner+='<div class="gcap">존2 평균(최근 4주): '+(z2avg?paceStr(z2avg)+' /km':'—')+' · 서브3 = 4\'15"/km</div>';
  return '<div class="card"><div class="ch"><span class="dot" style="background:'+c+'"></span>서브3 페이스</div>'+inner+'</div>';
}
function ballCard(){
  var tot=0,wk=0,ws=weekStart(todayStr());
  DB.logs.forEach(function(l){
    if(l.sport==='볼마스터리'&&l.durationMin)tot+=l.durationMin;
    if(l.date>=ws&&['볼마스터리','풋살','축구','반응'].indexOf(l.sport)>=0)wk++;
  });
  var c=SPORT['볼마스터리'];
  return '<div class="card"><div class="ch"><span class="dot" style="background:'+c+'"></span>볼 마스터리 · 구기</div>'
    +'<div class="bigrow">'
    +'<div class="bignum"><b>'+(tot/60).toFixed(1)+'h</b><span>볼마스터리 누적</span></div>'
    +'<div class="bignum"><b>'+wk+'</b><span>이번 주 구기·반응</span></div>'
    +'</div><div class="gcap">무의식적으로 나올 때까지 — 누적 시간이 근거</div></div>';
}
function memoLabel(l){return (l.title||'').replace(/^\d+\/\d+\s*/,'')||l.sport||'기록'}
function memoGroupOf(sp){
  if(sp==='리프팅'||sp==='러닝')return sp;
  if(HEAT_GROUPS['구기'].indexOf(sp)>=0)return'구기';
  if(HEAT_GROUPS['보강'].indexOf(sp)>=0)return'보강';
  return'기타';
}
function collectMemos(){
  var out=[];
  DB.logs.forEach(function(l){
    var sp=l.sport||'기타';
    if(l.memo)out.push({date:l.date,sport:sp,name:memoLabel(l),text:l.memo});
    if(sp==='리프팅'){
      var ex=rawOf(l).ex;
      if(ex)ex.forEach(function(e){if(e.m)out.push({date:l.date,sport:sp,name:e.n||'운동',text:e.m})});
    }
  });
  out.sort(function(a,b){return a.date<b.date?1:(a.date>b.date?-1:0)});
  return out;
}
function memoCard(){
  var all=collectMemos();
  var pool=MEMO_G==='all'?all:all.filter(function(m){return memoGroupOf(m.sport)===MEMO_G});
  var names=[],seen={};
  pool.forEach(function(m){if(!seen[m.name]){seen[m.name]=1;names.push(m.name)}});
  if(MEMO_N!=='all'&&!seen[MEMO_N])MEMO_N='all';
  var list=MEMO_N==='all'?pool:pool.filter(function(m){return m.name===MEMO_N});
  var gchips=[['all','전체'],['리프팅','리프팅'],['러닝','러닝'],['구기','구기'],['보강','보강']].map(function(g){
    return '<button class="chip'+(MEMO_G===g[0]?' on':'')+'" data-mg="'+g[0]+'" type="button">'+g[1]+'</button>';
  }).join('');
  var nchips='';
  if(names.length>1){
    nchips='<div class="chips scroll" style="margin-top:8px">'
      +'<button class="chip'+(MEMO_N==='all'?' on':'')+'" data-mn="all" type="button">전체</button>'
      +names.slice(0,20).map(function(n){return '<button class="chip'+(MEMO_N===n?' on':'')+'" data-mn="'+esc(n)+'" type="button">'+esc(n)+'</button>'}).join('')
      +'</div>';
  }
  var items;
  if(!list.length){
    items='<div class="empt">'+(all.length?'해당 조건의 메모가 없어요':'기록 시트의 메모, 또는 리프팅 운동 블록의 📝 버튼으로 메모를 남겨보세요')+'</div>';
  }else{
    items='<div class="mlist">'+list.slice(0,40).map(function(m){
      var c=SPORT[m.sport]||SPORT['기타'];
      return '<button class="mitem" data-md="'+m.date+'" type="button" style="--c:'+c+'">'
        +'<span class="mdate">'+m.date.slice(5).replace('-','/')+'</span>'
        +'<span class="mbody"><b>'+esc(m.name)+'</b>'+esc(m.text)+'</span></button>';
    }).join('')+'</div>'+(list.length>40?'<div class="gcap">최근 40개만 표시</div>':'');
  }
  return '<div class="card"><div class="ch"><span class="dot" style="background:#E8C547"></span>운동 메모</div>'
    +'<div class="chips scroll">'+gchips+'</div>'+nchips+items+'</div>';
}

/* ================= 설정 ================= */
function renderSet(){
  var h='<div class="card"><div class="ch">🔒 PIN</div>'
    +'<input id="sPin" class="in num" type="password" inputmode="numeric" placeholder="설정 안 함" value="'+esc(getPin())+'">'
    +'<button class="sbtn" data-s="pin" type="button">PIN 저장</button>'
    +'<div class="note">Vercel의 APP_PIN 환경 변수와 같은 값이어야 통신이 됩니다.</div></div>';
  h+='<div class="card"><div class="ch">📦 현재 블록</div>'
    +'<div class="chips" style="margin-bottom:10px">'
    +['근비대','근력','피킹','유지','베이스','빌드'].map(function(b){
      return '<button class="chip'+(b===CFG.blockName?' on':'')+'" data-b="'+b+'" type="button">'+b+'</button>'}).join('')
    +'</div><div class="row2">'
    +'<div class="fld" style="margin:0"><div class="fl">블록 이름</div><input id="sBlock" class="in" value="'+esc(CFG.blockName)+'" placeholder="근력"></div>'
    +'<div class="fld" style="margin:0"><div class="fl">시작일</div><input id="sBStart" class="in" type="date" value="'+esc(CFG.blockStart)+'"></div>'
    +'</div><button class="sbtn" data-s="block" type="button">블록 저장</button>'
    +'<div class="note">저장하는 모든 기록에 블록 태그가 붙어요. 홈 상단에 현재 주차가 표시됩니다.</div></div>';
  h+='<div class="card"><div class="ch">🔄 데이터</div>'
    +'<button class="sbtn" data-s="flush" type="button">대기 중 기록 다시 전송'+((Q.length+DEL.length)?' ('+(Q.length+DEL.length)+')':'')+'</button>'
    +'<button class="sbtn warn" data-s="resync" type="button">노션에서 전체 다시 불러오기</button>'
    +'<div class="note">기록은 노션 DB에 저장되고 이 기기에 캐시됩니다(최근 420일). ☔ 비 토글을 켜면 야외 러닝·축구가 실내 대체 항목으로 바뀝니다.</div></div>';
  el('setBody').innerHTML=h;
}
el('setBody').addEventListener('click',function(e){
  var b=e.target.closest('[data-b]');
  if(b){
    el('sBlock').value=b.getAttribute('data-b');
    b.parentElement.querySelectorAll('.chip').forEach(function(x){x.classList.toggle('on',x===b)});
    return;
  }
  var s=e.target.closest('[data-s]');
  if(!s)return;
  var a=s.getAttribute('data-s');
  if(a==='pin'){
    try{localStorage.setItem('wk2_pin',el('sPin').value.trim())}catch(e2){}
    toast('PIN 저장됨');boot();
  }else if(a==='block'){
    CFG.blockName=el('sBlock').value.trim();
    CFG.blockStart=el('sBStart').value;
    store('wk2_cfg',CFG);renderChips();toast('블록 저장됨');
  }else if(a==='resync'){
    flushQ().then(function(){sync(true)});
  }else if(a==='flush'){
    flushQ().then(function(){renderSet()});
  }
});

/* ================= 내비 · 초기화 ================= */
var curView='today';
function switchView(v){
  curView=v;
  document.querySelectorAll('#nav button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-v')===v)});
  ['today','stats','set'].forEach(function(x){el('v-'+x).classList.toggle('on',x===v)});
  if(v==='stats')renderStats();
  if(v==='set')renderSet();
  window.scrollTo(0,0);
}
function renderAll(){
  renderToday();
  if(curView==='stats')renderStats();
  if(curView==='set')renderSet();
}
document.querySelectorAll('#nav button').forEach(function(b){
  b.addEventListener('click',function(){switchView(b.getAttribute('data-v'))});
});
el('dPrev').addEventListener('click',function(){cur=shiftD(cur,-1);renderToday();if(el('cal').classList.contains('on')){calM=cur.slice(0,7);renderCal()}});
el('dNext').addEventListener('click',function(){cur=shiftD(cur,1);renderToday();if(el('cal').classList.contains('on')){calM=cur.slice(0,7);renderCal()}});
el('dlBtn').addEventListener('click',function(){
  if(el('cal').classList.contains('on'))closeCal();else openCal();
});
el('calPrev').addEventListener('click',function(){calShift(-1)});
el('calNext').addEventListener('click',function(){calShift(1)});
el('calGrid').addEventListener('click',function(e){
  var d=e.target.closest('[data-d]');
  if(!d)return;
  cur=d.getAttribute('data-d');
  closeCal();renderToday();
});
el('statsBody').addEventListener('click',function(e){
  var f=e.target.closest('[data-hf]');
  if(f){HEAT_F=f.getAttribute('data-hf');renderStats();return}
  var g=e.target.closest('[data-mg]');
  if(g){MEMO_G=g.getAttribute('data-mg');MEMO_N='all';renderStats();return}
  var n=e.target.closest('[data-mn]');
  if(n){MEMO_N=n.getAttribute('data-mn');renderStats();return}
  var d=e.target.closest('[data-md]');
  if(d){cur=d.getAttribute('data-md');switchView('today');renderToday()}
});
el('rainChip').addEventListener('click',function(){
  if(CFG.rain[cur])delete CFG.rain[cur];else CFG.rain[cur]=1;
  store('wk2_cfg',CFG);renderToday();
});
el('blockChip').addEventListener('click',function(){switchView('set')});
el('shClose').addEventListener('click',closeSheet);
el('scrim').addEventListener('click',function(){closeSheet();closeCal()});
el('shSave').addEventListener('click',saveSheet);
el('shDel').addEventListener('click',delSheet);
el('exlist').innerHTML=EXS.map(function(x){return '<option value="'+x+'">'}).join('');

function boot(){flushQ().then(function(){return sync(false)})}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}
window.addEventListener('online',function(){boot()});
renderAll();
setSyncUI();
boot();
</script>
